<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Продукция</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="header">...</header>

<section class="container">
  <h1>Наша продукция</h1>
  <p class="subtitle">Свежие ягоды и фрукты прямо с полей</p>

  <div class="grid">
    <div class="product-card">
      <img src="assets/images/currant.jpg" />
      <h3>Черная смородина</h3>
      <span class="tag">Ягоды</span>
      <p>Свежая ароматная ягода</p>
      <strong class="price">250 ₽/кг</strong>
      <button class="btn add-to-cart">В корзину</button>
    </div>

    <div class="product-card">
      <img src="assets/images/apple1.jpg" />
      <h3>Яблоки «Антоновка»</h3>
      <span class="tag">Фрукты</span>
      <p>Классический сорт</p>
      <strong class="price">120 ₽/кг</strong>
      <button class="btn add-to-cart">В корзину</button>
    </div>
  </div>
</section>

<footer class="footer">...</footer>

</body>
</html>
